name: CI

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-project:
    name: Validate Project Structure
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    
    - name: Check required files exist
      run: |
        echo "Checking project structure..."
        test -f "cmd/x/main.go" || (echo "❌ cmd/x/main.go missing" && exit 1)
        test -f go.mod || (echo "❌ go.mod missing" && exit 1)
        test -f Makefile || (echo "❌ Makefile missing" && exit 1)
        test -f README.md || (echo "❌ README.md missing" && exit 1)
        test -f .golangci.yml || (echo "❌ .golangci.yml missing" && exit 1)
        test -f config.example.yaml || (echo "❌ config.example.yaml missing" && exit 1)
        echo "✅ All required project files present"
    
    - name: Validate module path
      run: |
        echo "Checking module path..."
        if grep -q "github.com/dl-alexandre/X-CLI" go.mod; then
          echo "✅ Module path is correct"
        else
          echo "❌ Invalid module path in go.mod"
          exit 1
        fi
        
        if grep -q "X-CLI" README.md && grep -q "github.com/dl-alexandre/X-CLI" README.md; then
          echo "✅ README has proper references"
        else
          echo "❌ README missing expected references"
          exit 1
        fi
    
    - name: Check files have content
      run: |
        echo "Checking file contents..."
        test -s go.mod || (echo "❌ go.mod is empty" && exit 1)
        test -s "cmd/x/main.go" || (echo "❌ main.go is empty" && exit 1)
        test -s internal/cli/cli.go || (echo "❌ cli.go is empty" && exit 1)
        echo "✅ All required files have content"

  cross-platform:
    name: Cross-Platform Validation
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    
    - name: Check project files (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Write-Host "Checking project structure on Windows..."
        if (!(Test-Path "go.mod")) { throw "❌ go.mod missing" }
        if (!(Test-Path "Makefile")) { throw "❌ Makefile missing" }
        if (!(Test-Path "README.md")) { throw "❌ README.md missing" }
        Write-Host "✅ All required project files present"
    
    - name: Check project files (Unix)
      if: runner.os != 'Windows'
      run: |
        echo "Checking template structure on ${{ runner.os }}..."
        test -f go.mod || (echo "❌ go.mod missing" && exit 1)
        test -f Makefile || (echo "❌ Makefile missing" && exit 1)
        test -f README.md || (echo "❌ README.md missing" && exit 1)
        echo "✅ All required project files present on ${{ runner.os }}"
