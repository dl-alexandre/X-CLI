
version: 2

project_name: x

before:
  hooks:
    # Tidy and verify dependencies
    - go mod tidy
    - go mod verify
    # Run tests to ensure quality before release
    - go test ./...

builds:
  - id: x
    main: ./cmd/x
    binary: x
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    goarm:
      - "7"
    ignore:
      # Skip 32-bit builds
      - goos: windows
        goarch: arm
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.gitCommit={{.Commit}}
      - -X main.buildTime={{.Date}}
    flags:
      - -trimpath

archives:
  - id: x
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - completions/*
    wrap_in_directory: true

checksum:
  name_template: "checksums.txt"
  algorithm: blake3

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: "^.*feat[/(].*"
      order: 0
    - title: Bug Fixes
      regexp: "^.*fix[/(].*"
      order: 1
    - title: Improvements
      regexp: "^.*improve[/(].*"
      order: 2
    - title: Documentation
      regexp: "^.*docs[/(].*"
      order: 3
    - title: Other
      order: 999

release:
  github:
    owner: dl-alexandre
    name: X-CLI
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## x v{{.Version}}
    
    Full Changelog: https://github.com/dl-alexandre/X-CLI/compare/{{.PreviousTag}}...v{{.Version}}
  footer: |
    ## Installation
    
    ### Go Install
    ```bash
    go install github.com/dl-alexandre/X-CLI/cmd/x@latest
    ```
    
    ### Binary Download
    Download the appropriate binary for your platform from the assets below.
    
    ### Verification
    Verify checksums:
    ```bash
    b3sum -c checksums.txt
    ```

brews:
  - name: x-cli
    repository:
      owner: dl-alexandre
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
      branch: master
      pull_request:
        enabled: false
    commit_author:
      name: goreleaserbot
      email: bot@dl-alexandre.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    directory: Formula
    description: "Terminal-first CLI for X with AI-friendly outputs"
    homepage: "https://github.com/dl-alexandre/X-CLI"
    license: "MIT"
    skip_upload: "{{ if index .Env \"HOMEBREW_TAP_TOKEN\" }}false{{ else }}true{{ end }}"
    test: |
      system "#{bin}/x", "version"
    install: |
      bin.install "x"

flatpak:
  - app_id: net.ddns.dl-alexandre.XCLI
    runtime: org.freedesktop.Platform
    runtime_version: "24.08"
    sdk: org.freedesktop.Sdk
    finish_args:
      - --share=network
      - --filesystem=home

srpm:
  enabled: true
  summary: "Terminal-first CLI for X with AI-friendly outputs"
  license: MIT
  url: https://github.com/dl-alexandre/X-CLI

scoops:
  - repository:
      owner: dl-alexandre
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
      branch: main
      pull_request:
        enabled: false
    commit_author:
      name: goreleaserbot
      email: bot@dl-alexandre.com
    commit_msg_template: "Scoop update for {{ .ProjectName }} version {{ .Tag }}"
    directory: bucket
    description: "Terminal-first CLI for X with AI-friendly outputs"
    homepage: "https://github.com/dl-alexandre/X-CLI"
    license: MIT
    skip_upload: "{{ if index .Env \"SCOOP_BUCKET_TOKEN\" }}false{{ else }}true{{ end }}"
    persist:
      - "config.yaml"

